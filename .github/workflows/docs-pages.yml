name: Publish Versioned Docs

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths:
      - ".github/workflows/docs-pages.yml"
      - "info/**"
      - "docs/**"
      - "scripts/node/**"
      - "README.rst"
      - "CHANGELOG.rst"
      - "pyproject.toml"
      - "setup.py"
      - "requirements.txt"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    uses: Officer-Erik-1K-88/ThornForge/.github/workflows/docs-pages.yml@main
    with:
      thornforge-ref: "main"
